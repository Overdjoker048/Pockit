<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POCKIT NFC | Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #050505; color: #e0e0e0; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .gold-text { color: #c9a050; }
        .gold-bg { background-color: #c9a050; color: #000; }
        .nav-link:hover { color: #c9a050; }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center p-6 border-b border-gray-900 sticky top-0 bg-black/90 backdrop-blur-sm z-50">
        <a href="index.html" class="text-3xl font-serif font-bold tracking-widest gold-text">POCKIT</a>
        <div class="flex space-x-8 text-sm uppercase tracking-wider items-center">
            <a href="index.html" class="nav-link">Accueil</a>
            <a href="vente.html" class="nav-link">Boutique</a>
            <a href="contact.html" class="nav-link gold-text">Contact</a>
            <a href="vente.html" class="gold-bg px-6 py-2 rounded-full font-bold text-xs uppercase">Créer ma carte</a>
        </div>
    </nav>

    <section class="py-24 px-6 flex flex-col items-center">
        <h1 class="text-5xl font-serif gold-text mb-12">Discutons de votre projet</h1>
        
        <div class="w-full max-w-4xl grid md:grid-cols-3 gap-8 mb-16 text-center">
            <div class="p-6 bg-zinc-900 rounded-lg border border-gray-800">
                <div class="text-3xl gold-text mb-2">✉️</div>
                <p class="text-sm font-bold text-white">Email</p>
                <p class="text-sm text-gray-400 mt-1">contact@POCKIT-nfc.com</p>
            </div>
            <div class="p-6 bg-zinc-900 rounded-lg border border-gray-800">
                <div class="text-3xl gold-text mb-2">📞</div>
                <p class="text-sm font-bold text-white">Téléphone</p>
                <p class="text-sm text-gray-400 mt-1">+33 1 23 45 67 89</p>
            </div>
            <div class="p-6 bg-zinc-900 rounded-lg border border-gray-800">
                <div class="text-3xl gold-text mb-2">📍</div>
                <p class="text-sm font-bold text-white">Atelier</p>
                <p class="text-sm text-gray-400 mt-1">Paris, France</p>
            </div>
        </div>

        <form class="w-full max-w-2xl bg-zinc-900 p-10 rounded-2xl border border-gray-800 shadow-2xl space-y-6">
            <div class="grid md:grid-cols-2 gap-6">
                <input type="text" placeholder="Prénom Nom" class="bg-black border border-gray-700 p-4 rounded text-sm focus:outline-none focus:border-yellow-600">
                <input type="email" placeholder="Email professionnel" class="bg-black border border-gray-700 p-4 rounded text-sm focus:outline-none focus:border-yellow-600">
            </div>
            <input type="text" placeholder="Sujet" class="w-full bg-black border border-gray-700 p-4 rounded text-sm focus:outline-none focus:border-yellow-600">
            <textarea placeholder="Décrivez votre besoin pour des cartes corporate ou personnelles..." class="w-full bg-black border border-gray-700 p-4 rounded text-sm h-40 focus:outline-none focus:border-yellow-600"></textarea>
            
            <button class="w-full gold-bg text-black font-bold py-4 rounded uppercase tracking-widest hover:bg-white transition duration-300">Envoyer la demande</button>
        </form>
    </section>

</body>
</html>
